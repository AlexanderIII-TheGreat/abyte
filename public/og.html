<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 50%, #eff6ff 100%);
      font-family: system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 60px;
    }
    .logo {
      font-size: 72px;
      font-weight: 800;
      color: #2563eb;
      margin-bottom: 20px;
      letter-spacing: -2px;
    }
    .tagline {
      font-size: 28px;
      color: #4b5563;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">abyte</div>
    <div class="tagline">Tech Blog & Articles</div>
  </div>
</body>
</html>
